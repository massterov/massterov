<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio</title>

<style>

@font-face {
  font-family: 'BarlowCondensed';
  src: url('fonts/BarlowCondensed-Medium.otf') format('truetype');
  font-weight: 600;
}

@font-face {
  font-family: 'Comfortaa';
  src: url('fonts/comfortaa.ttf') format('truetype');
  font-weight: 600;
}

@font-face {
  font-family: 'PlayfairDisplay';
  src: url('fonts/PlayfairDisplay-Bold.woff2') format('woff2');
  font-weight: 700;
}

section {
  padding: 40px 20px;
  max-width: 1100px;
  margin: auto;
}

/* убираем линию у первого блока */
section:first-of-type {
  border-top: none;
}

/* === АНИМАЦИЯ СМЕНЫ ЯЗЫКА === */
.lang-fade {
  opacity: 0;
  transform: translateY(5px);
  transition: opacity 0.25s ease, transform 0.25s ease;
}

/* === ПЕРЕМЕННЫЕ ТЕМЫ === */
:root {
  --bg: #1e1f22;
  --text: #e3e5e8;
  --accent: #5865f2;
  --card: #2b2d31;
}

.light-theme {
  --bg: #f5f5f5;
  --text: #111;
  --accent: #5865f2;
  --card: #ffffff;
}

/* === ОСНОВА === */
body {
  margin: 0;
  font-family: 'BarlowCondensed', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: opacity 1.5s ease, background 0.4s ease, color 0.4s ease;
  opacity: 0; /* старт прозрачный */
}

body.loaded {
  opacity: 1;
}

.hero {
  text-align: center;
  padding-top: 50px;
}

.btn {
  padding: 12px 24px;
  background: var(--accent);
  color: white;
  border-radius: 8px;
  text-decoration: none;
}

/* === КНОПКИ === */
.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;

  width: 39px;
  height: 39px;

  background: var(--card);
  color: var(--text);

  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%; /* оставляем сферу */

  cursor: pointer;
  font-size: 13px;

  display: flex;
  align-items: center;
  justify-content: center;

  transition: all 0.3s ease;
}

.theme-toggle:hover {
  transform: scale(1.08);
  opacity: 0.9;
}

.theme-toggle:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

.lang-toggle {
  position: fixed;
  top: 20px;
  right: 70px;

  width: 39px;
  height: 39px;

  background: var(--card);
  color: var(--text);

  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%; /* оставляем сферу */

  cursor: pointer;
  font-size: 13px;

  display: flex;
  align-items: center;
  justify-content: center;

  transition: all 0.3s ease;
}

.lang-toggle:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

/* === НАВИГАЦИЯ === */
.side-nav {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.nav-dot {
  width: 12px;
  height: 12px;
  background: var(--text);
  opacity: 0.4;
  border-radius: 50%;
  cursor: pointer;
  transition: all 0.3s;
}

.nav-dot:hover {
  opacity: 1;
  transform: scale(1.3);
}

/* === АНИМАЦИЯ === */
.fade {
  opacity: 0;
  transform: translateY(50px);
  transition: opacity 1s ease, transform 1s ease;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* === ПОРТФОЛИО === */
.portfolio-row {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  align-items: center; /* центр по вертикали */
}

.portfolio-row video {
  width: 320px !important;   /* жестко фиксируем ширину */
  height: 180px !important;  /* фиксируем высоту */
  flex: 0 0 auto;            /* запрещаем растягивание */
  object-fit: cover;         /* сохраняет пропорции красиво */
  display: block;            /* убирает inline поведение */
  border-radius: 12px;
}

/* === СКРОЛЛБАР === */
.portfolio-row::-webkit-scrollbar {
  height: 8px;
}

.portfolio-row::-webkit-scrollbar-thumb {
  background: var(--accent);
  border-radius: 10px;
}

/* === КАРТОЧКИ === */
.card {
  background: var(--card);           /* фон карточки */
  border: 1px solid rgba(255,255,255,0.08); /* тонкая обводка */
  border-radius: 16px;               /* скругление */
  padding: 30px;                     /* внутренние отступы */
  margin-bottom: 40px;               /* расстояние между блоками */
  box-shadow: 0 10px 30px rgba(0,0,0,0.2); /* лёгкая тень */
  transition: all 0.3s ease;
}

/* === FAQ === */
.faq-item {
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding: 15px 0;
}

.faq-question {
  cursor: pointer;
  font-size: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.3s ease;
}

.faq-question:hover {
  opacity: 0.7;
}

.faq-question::after {
  content: "+";
  transition: transform 0.3s ease;
}

.faq-item.active .faq-question::after {
  transform: rotate(45deg);
}

/* === ОТВЕТ С ПЛАВНОЙ АНИМАЦИЕЙ === */
.faq-answer {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transform: translateY(-10px);
  transition: all 0.4s ease;
  font-size: 24px;
  margin-top: 5px;
}

.faq-item.active .faq-answer {
  max-height: 2000px;
  opacity: 1;
  transform: translateY(0);
}

/* === МОБИЛКА === */
@media (max-width: 600px) {
  .side-nav {
    right: 10px;
  }

  .portfolio video {
    height: 180px;
  }
}

:root {
  --font-heading: 'BarlowCondensed', sans;      /* заголовки */
  --font-body: 'Comfortaa', sans-serif; /* текст */
  --font-brand: 'PlayfairDisplay', serif;    /* ник (по желанию) */
}

body {
  font-family: var(--font-body); /* весь обычный текст */
  font-size: 24px;
}

h1, h2, h3 {
  font-family: var(--font-heading); /* все заголовки */
  font-size: 48px;
  text-align: center;
  margin-top: 0;        /* убирает верхний отступ */
  margin-bottom: 20px;  /* расстояние до контента ниже */
}

.hero h1 {
  font-size: 90px;
  letter-spacing: 2px;
}

.footer {
  text-align: center;      /* центр текста */
  font-size: 15px;          /* меньше основного текста */
  opacity: 0.5;             /* приглушённый вид */
  padding: 0px;            /* компактность */
  margin-bottom: 20px;      /* отступ снизу страницы */
}

.social-icons {
  display: flex;          /* иконки в ряд */
  gap: 50px;              /* расстояние между ними */
  justify-content: center;/* центрирование */
  margin-top: 20px;
}

.icon img {
  width: 40px;            /* размер иконки */
  height: 40px;
  transition: transform 0.3s ease, opacity 0.3s ease;
  cursor: pointer;
}

.icon img:hover {
  transform: scale(1.2);  /* эффект увеличения */
  opacity: 0.8;
}

</style>
</head>

<body>

<!-- КНОПКИ -->
<button class="theme-toggle" onclick="toggleTheme()">🌓</button>
<button class="lang-toggle" onclick="toggleLang()">🌐</button>

<!-- НАВИГАЦИЯ -->
<div class="side-nav">
  <div class="nav-dot" onclick="scrollToSection('hero')"></div>
  <div class="nav-dot" onclick="scrollToSection('portfolio')"></div>
  <div class="nav-dot" onclick="scrollToSection('faq')"></div>
  <div class="nav-dot" onclick="scrollToSection('contact')"></div>
</div>

<!-- HERO -->
<section id="hero" class="hero fade">
  <h1 data-ru="MASSTEROV" data-en="MASSTEROV"></h1>
  <p data-ru="Твой партнер в мире монтажа и анимации видео" data-en="Your partner in the world of video editing and animation
"></p>
 </section>

<!-- PORTFOLIO -->
 <section id="portfolio" class="fade">
  <div class="card">

    <h2 data-ru="Портфолио" data-en="Portfolio">Портфолио</h2>

    <div class="portfolio-row">
      <video src="video1.mp4" controls></video>
      <video src="video2.mp4" controls></video>
      <video src="video3.mp4" controls></video>
    </div>

  </div>
</section>

<!-- FAQ -->
<section id="faq" class="fade">
  <div class="card">
    <h2 data-ru="FAQ" data-en="FAQ">FAQ</h2>

    <div class="faq">

      <div class="faq-item">
        <div class="faq-question" data-ru="Обо мне" data-en="About me">
          Сроки выполнения?
        </div>
        <div class="faq-answer" data-ru="<br>Меня зовут Захар, и я занимаюсь созданием моушн-анимации и видеомонтажом. При сотрудничестве я могу гарантировать четкое соблюдение дедлайнов, 
    соответствие вашим идеям и ожиданиям, а также работу с правками до тех пор, пока вы не будете полностью довольны результатом." 
          data-en="<br>
My name is Zakhar, and I specialize in motion animation and video editing. When working with me, I guarantee strict adherence to deadlines, 
accommodating your ideas and expectations, and working with you on revisions until you're completely satisfied with the result."> 
        </div>
      </div>

      <div class="faq-item">
        <div class="faq-question" data-ru="Сроки выполнения" data-en="Delivery time">
          Сроки выполнения?
        </div>
        <div class="faq-answer" data-ru="<br>Время выполнения зависит от времени ролика и объема анимации в нем.<br><br>
          На популярные вертикальные ролики длиной около минуты требуется от 1 до 3 дней, а на сложные работы может уйти до недели в зависимости от длительности проекта." 
          data-en="<br>The completion time depends on the length of the video and the amount of animation it contains.<br><br>
Popular vertical videos about a minute long take 1 to 3 days, while more complex projects can take up to a week, depending on the length of the project."> 
        </div>
      </div>

      <div class="faq-item">
        <div class="faq-question" data-ru="Стомость услуг" data-en="Pricing">
          Цена услуг?
        </div>
        <div class="faq-answer" data-ru="<br>Стоимость коротких вертикальных роликов начинается от 1500 рублей за видеоролик.<br><br>
          Стоимость же длительных роликов (блоги, клипы, подкасты и другие) зависит от размера. Средняя стоимость за 5-минутный ролик составляет 4000-5000 рублей.<br><br>
          Стоит учесть, что финальная стоимость одного видеоролика зависит от объема анимации, ваших предпочтений и длительности самого ролика. Также при длительном сотрудничестве 
          возможны договорные скидки на массовые заказы." data-en="<br>Short vertical videos start at $20 per video.<br><br>
The cost of longer videos (blogs, clips, podcasts, and others) depends on their size. The average cost for a 5-minute video is $50.<br><br>
It's worth keeping in mind that the final cost of a single video depends on the amount of animation, your preferences, and the length of the video itself. Also, for long-term collaborations,

    </div>

</section>

<!-- CONTACT -->
<section id="contact" class="fade">
  <div class="card">
<h2 data-ru="Контакты" data-en="Contacts">Контакты</h2>
  <div class="social-icons">

  <a href="https://t.me/yourname" target="_blank" class="icon">
    <img src="icons/telegram.png" alt="Telegram">
  </a>

  <a href="mailto:your@email.com" class="icon">
    <img src="icons/mail.png" alt="Email">
  </a>

  <a href="https://instagram.com/yourname" target="_blank" class="icon">
    <img src="icons/instagram.png" alt="Instagram">
  </a>
  </div>
  </div>
</section>

<section id="footer" class="fade footer">
  <p data-ru="© 2026 MASSTEROV" data-en="© 2026 MASSTEROV">© 2026 MASSTEROV</p>
</section>

<script>

/* SCROLL */
function scrollToSection(id) {
  document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
}

/* THEME */
function toggleTheme() {
  document.body.classList.toggle('light-theme');
}

/* FAQ */
document.querySelectorAll('.faq-question').forEach(q => {
  q.addEventListener('click', () => {
    q.parentElement.classList.toggle('active');
  });
});

/* FADE ANIMATION */
const elements = document.querySelectorAll('.fade');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
});

elements.forEach(el => observer.observe(el));

/* LANGUAGE SWITCH */
let currentLang = "ru";

function setLanguage(lang) {
  const elements = document.querySelectorAll("[data-ru]");

  elements.forEach(el => {
    el.innerHTML = el.getAttribute("data-" + lang); // <-- ВАЖНО
  });

  currentLang = lang;
}

function toggleLang() {
  const elements = document.querySelectorAll("[data-ru]");

  // fade out
  elements.forEach(el => el.classList.add("lang-fade"));

  setTimeout(() => {
    const newLang = currentLang === "ru" ? "en" : "ru";
    setLanguage(newLang);

    // fade in
    elements.forEach(el => el.classList.remove("lang-fade"));

  }, 250);
}

document.addEventListener("DOMContentLoaded", () => {
  setLanguage("ru");
});

window.addEventListener("load", () => {
  setTimeout(() => {
    document.body.classList.add("loaded");
  }, 500); // задержка перед появлением (можешь поставить 1000-1500)
});

</script>

</body>
</html>
