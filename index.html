<style>

@font-face {
  font-family: 'BarlowCondensed';
  src: url('fonts/BarlowCondensed-Medium.otf') format('truetype');
  font-weight: 600;
}

@font-face {
  font-family: 'Comfortaa';
  src: url('fonts/comfortaa.ttf') format('truetype');
  font-weight: 600;
}

@font-face {
  font-family: 'PlayfairDisplay';
  src: url('fonts/PlayfairDisplay-Bold.woff2') format('woff2');
  font-weight: 700;
}

section {
  padding: 40px 20px;
  max-width: 1100px;
  margin: auto;
}

section:first-of-type {
  border-top: none;
}

/* === АНИМАЦИЯ СМЕНЫ ЯЗЫКА === */
.lang-fade {
  opacity: 0;
  transform: translateY(5px);
  transition: opacity 0.25s ease, transform 0.25s ease;
}

/* === ПЕРЕМЕННЫЕ ТЕМЫ === */
:root {
  --bg: #1e1f22;
  --text: #e3e5e8;
  --accent: #5865f2;
  --card: #2b2d31;
  --stroke-color: #ffffff; /* цвет обводки для темной темы */
}

.light-theme {
  --bg: #f5f5f5;
  --text: #111;
  --accent: #5865f2;
  --card: #ffffff;
  --stroke-color: #000000; /* цвет обводки для светлой темы - черный */
}

/* === ОСНОВА === */
body {
  margin: 0;
  font-family: 'BarlowCondensed', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: opacity 1.5s ease, background 0.4s ease, color 0.4s ease;
  opacity: 0;
}

body.loaded {
  opacity: 1;
}

.hero {
  text-align: center;
  padding-top: 70px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 1.2s ease, transform 1.2s ease;
}

body.loaded .hero {
  opacity: 1;
  transform: translateY(0);
}

/* === КНОПКИ === */
.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 39px;
  height: 39px;
  background: var(--card);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%;
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  z-index: 10000;
  pointer-events: auto;
}

.theme-toggle:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

.lang-toggle {
  position: fixed;
  top: 20px;
  right: 70px;
  width: 39px;
  height: 39px;
  background: var(--card);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%;
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  z-index: 10000;
  pointer-events: auto;
}

.lang-toggle:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

/* === АНИМАЦИЯ === */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  will-change: opacity, transform;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* ПОРТФОЛИО СТРОКИ */
.portfolio-row {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  align-items: center;
}

.portfolio-row.horizontal iframe {
  width: 420px;
  height: 236px;
  flex: 0 0 auto;
  border-radius: 12px;
  object-fit: cover;
}

.portfolio-row.vertical iframe {
  width: 240px;
  height: 426px;
  flex: 0 0 auto;
  border-radius: 12px;
  object-fit: cover;
}

.portfolio-row::-webkit-scrollbar {
  height: 8px;
}

.portfolio-row::-webkit-scrollbar-thumb {
  background: var(--accent);
  border-radius: 10px;
}

/* === КАРТОЧКИ === */
.card {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 30px;
  margin-bottom: 40px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  transition: all 0.3s ease;
}

/* === FAQ === */
.faq-item {
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding: 15px 0;
}

.faq-question {
  cursor: pointer;
  font-size: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.3s ease;
}

.faq-question:hover {
  opacity: 0.7;
}

.faq-question::after {
  content: "+";
  transition: transform 0.3s ease;
}

.faq-item.active .faq-question::after {
  transform: rotate(45deg);
}

.faq-answer {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transform: translateY(-10px);
  transition: all 0.4s ease;
  font-size: 24px;
  margin-top: 5px;
}

.faq-item.active .faq-answer {
  max-height: 2000px;
  opacity: 1;
  transform: translateY(0);
}

/* === МОБИЛКА === */

<script>
function scrollToSection(id) {
  document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
}

function toggleTheme() {
  document.body.classList.toggle('light-theme');
}

document.querySelectorAll('.faq-question').forEach(q => {
  q.addEventListener('click', () => {
    q.parentElement.classList.toggle('active');
  });
});

const elements = document.querySelectorAll('.fade');

function updateVisibility() {
  const height = window.innerHeight;
  const topZone = height * 0.15;
  const bottomZone = height * 0.85;

  elements.forEach(el => {
    const rect = el.getBoundingClientRect();
    const isVisible = rect.top < bottomZone && rect.bottom > topZone;
    if (isVisible) {
      el.classList.add('show');
    } else {
      el.classList.remove('show');
    }
  });
}

window.addEventListener('scroll', updateVisibility);
window.addEventListener('load', updateVisibility);
window.addEventListener('resize', updateVisibility);

let currentLang = "ru";

function setLanguage(lang) {
  const regularElements = document.querySelectorAll("[data-ru]:not(.hero-title-wrapper span)");
  regularElements.forEach(el => {
    if (el.getAttribute("data-" + lang)) {
      el.innerHTML = el.getAttribute("data-" + lang);
    }
  });

  const strokeSpan = document.querySelector('.hero h1 .stroke-text');
  const normalSpan = document.querySelector('.hero h1 .normal-part');
  
  if (strokeSpan) {
    const strokeText = lang === "ru" ? strokeSpan.getAttribute("data-ru-stroke") : strokeSpan.getAttribute("data-en-stroke");
    if (strokeText) strokeSpan.innerText = strokeText;
  }
  if (normalSpan) {
    const normalText = lang === "ru" ? normalSpan.getAttribute("data-ru-normal") : normalSpan.getAttribute("data-en-normal");
    if (normalText) normalSpan.innerText = normalText;
  }
  
  currentLang = lang;
}

function toggleLang() {
  const allLangElements = document.querySelectorAll("[data-ru], .stroke-text, .normal-part");
  
  allLangElements.forEach(el => {
    if (el.classList) el.classList.add("lang-fade");
  });
  
  setTimeout(() => {
    const newLang = currentLang === "ru" ? "en" : "ru";
    setLanguage(newLang);
    
    allLangElements.forEach(el => {
      if (el.classList) el.classList.remove("lang-fade");
    });
  }, 200);
}

document.addEventListener("DOMContentLoaded", () => {
  setLanguage("ru");
});

window.addEventListener("load", () => {
  setTimeout(() => {
    document.body.classList.add("loaded");
    updateVisibility();
  }, 300);
});
</script>
